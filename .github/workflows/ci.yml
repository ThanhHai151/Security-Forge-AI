name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Lint
        run: |
          ruff check ai_framework backend knowledge_base vuln_search defense labs i18n tests
          mypy ai_framework backend knowledge_base vuln_search defense labs i18n
      - name: Test
        run: pytest
